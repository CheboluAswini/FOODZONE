version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: foodzone_mongodb
    ports:
      - '27017:27017'
    volumes:
      - foodzone_data:/data/db
    networks:
      - foodzone_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodzone_backend
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/foodzone
      - JWT_SECRET=development_secret_key_123
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin
      - ML_SERVICE_URL=http://ml-service:8000
    networks:
      - foodzone_network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: foodzone_ml_service
    ports:
      - '8000:8000'
    networks:
      - foodzone_network

volumes:
  foodzone_data:

networks:
  foodzone_network:
    driver: bridge
